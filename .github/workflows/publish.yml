name: Build and Deploy
on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write

jobs:
  test:
    name: Test 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Run tests
        run: flutter test

  build_web:
    name: Build Web Client 🌐
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Flutter Web target
        run: flutter build web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web-release
          path: build/web

  build_apk:
    name: Build Android Client 🤖
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v1
        with:
          java-version: "12.x"

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Flutter Android target
        run: flutter build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-release
          path: ./build/app/outputs/flutter-apk/app-release.apk

  build_win:
    name: Build Windows Client 🪟
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Flutter Windows target
        run: |
            flutter config --enable-windows-desktop
            flutter build windows

      - name: Zip Windows release directory
        run: 7z a build\windows\runner\Release.zip build\windows\runner\Release\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-release
          path: build\windows\runner\Release.zip

  build_mac:
    name: Build Mac Client 🍎
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: 'stable'

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Flutter MacOS target
        run: |
          flutter config --enable-macos-desktop
          flutter build macos

      - name: Zip MacOS release directory
        run: 7z a ./build/macos/Release.zip ./build/macos/Build//Products/Release/project_armoire.app

      - name: Upload MacOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacOS-release
          path: ./build/macos/Release.zip

  release_rolling:
    name: 🔄 Refresh latest-main release
    runs-on: ubuntu-latest
    needs: [test, build_web, build_apk, build_win, build_mac]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          cp dist/Android-release/* release/android-release.apk 2>/dev/null || true
          cp dist/Windows-release/* release/windows-release.zip 2>/dev/null || true
          cp dist/MacOS-release/* release/macos-release.zip 2>/dev/null || true
          ls -lh release/

      - name: Delete previous latest-main release + tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-main --yes --cleanup-tag --repo "${{ github.repository }}" || true

      - name: Publish rolling latest-main release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-main
          name: 'Latest main build'
          prerelease: true
          make_latest: 'false'
          draft: false
          target_commitish: ${{ github.sha }}
          body: |
            Auto-built from `master` at commit `${{ github.sha }}`.
          files: release/*

  release_tag:
    name: 🏷️ Create tagged release
    runs-on: ubuntu-latest
    needs: [test, build_web, build_apk, build_win, build_mac]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts for release
        run: |
          mkdir -p release
          cp dist/Android-release/* release/android-release.apk 2>/dev/null || true
          cp dist/Windows-release/* release/windows-release.zip 2>/dev/null || true
          cp dist/MacOS-release/* release/macos-release.zip 2>/dev/null || true
          ls -lh release/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          name: Project Armoire ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: release/*

  publish_web:
    name: Publish to GitHub Pages 🕸️
    runs-on: ubuntu-latest
    needs: [build_web, test]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: Web-release
          path: web_build

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p .github/pages/game
          cp -r web_build/. .github/pages/game/
          cp CHANGELOG.md .github/pages/ 2>/dev/null || true
          cp README.md .github/pages/ 2>/dev/null || true
          cp -r docs .github/pages/docs 2>/dev/null || true

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@4.1.4
        with:
          branch: gh-pages
          folder: .github/pages
